services:
  database:
    image: postgres:17
    container_name: sbcp-database
    environment:
      POSTGRES_DB: sbcp
      POSTGRES_USER: sbcp_user
      POSTGRES_PASSWORD: sbcp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbcp_user -d sbcp"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: sbcp-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: sbcp
      DB_USER: sbcp_user
      DB_PASSWORD: sbcp_pass
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sbcp-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data: